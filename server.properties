#Minecraft server properties - Zsem Create Server
#Wygenerowane dla NeoForge 1.21.1

# === Sieć ===
server-port=25565
server-ip=
network-compression-threshold=256
rate-limit=0
enable-status=true
enable-query=false
prevent-proxy-connections=false

# === Tryb / autoryzacja (online-mode + EasyAuth obsluguje cracked + SkinRestorer + ModWhitelist) ===
# online-mode=true: premium auto-login dziala natywnie, cracked players sa obslugiwani przez EasyAuth
online-mode=true
enforce-secure-profile=false
white-list=false
enforce-whitelist=false
op-permission-level=4
function-permission-level=2
broadcast-console-to-ops=true
broadcast-rcon-to-ops=true

# === RCON ===
enable-rcon=false
rcon.port=25575
rcon.password=

# === Świat ===
level-name=world
level-seed=
level-type=minecraft\:normal
generator-settings={}
allow-nether=false
generate-structures=true
hardcore=false
# Spawny (zostawiamy vanilla dla gameplayu)
spawn-monsters=true
spawn-animals=true
spawn-npcs=true
max-tick-time=60000
# Optymalizacja dla 50-100 graczy na 8GB RAM:
# view-distance = 8 (128 blokow widoku - dla 8GB RAM)
# simulation-distance = 8 (redstone dziala do 128 blokow - nie ruszamy!)
view-distance=8
simulation-distance=8
# 75% = mniej entity widzialnych na raz, mniej pakietow do wyslania
entity-broadcast-range-percentage=75
max-world-size=29999984
max-build-height=256

# === Gameplay ===
gamemode=survival
force-gamemode=false
difficulty=normal
pvp=true
allow-flight=true
spawn-protection=0
player-idle-timeout=0
max-players=100

# === MOTD (kolory: § kody) ===
# §c = czerwony, §6 = zloty, §e = zolty, §a = jasnozielony, §b = cyjan, §d = magenta, §l = bold, §o = italic, §r = reset
motd=§6§l✦ §e§lZsem Create §6§l✦ §r§7- §bLogowanie & Build & Adventure§r\n§a§oCreate • Mosty • Pojazdy • Numismatics §r§7| §dwersja 1.21.1 NeoForge

# === Bezpieczeństwo / exploity ===
sync-chunk-writes=true
use-native-transport=true
enable-jmx-monitoring=false
hide-online-players=false
require-resource-pack=false
resource-pack=
resource-pack-prompt=
resource-pack-sha1=

# === Limity (anty-spam) ===
max-tick-time=60000
max-chained-neighbor-updates=1000000
text-filtering-config=

# === Inne ===
snooper-enabled=false
debug=false
initial-disabled-packs=
initial-enabled-packs=vanilla
log-ips=true
pause-when-empty-seconds=60
region-file-compression=deflate
accepts-transfers=false
bug-report-link=
